name: Feature request
description: Suggest an improvement to the repository, runtime, or host integrations
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Runtime
        - Codex
        - Claude Code
        - Gemini CLI
        - Documentation
        - GitHub automation
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Expected impact
