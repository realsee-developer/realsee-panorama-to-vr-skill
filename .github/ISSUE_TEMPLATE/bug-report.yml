name: Bug report
description: Report a reproducible repository or runtime bug
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Before filing:
        - run `npm run ci`
        - remove secrets and private panorama data from logs
  - type: dropdown
    id: host
    attributes:
      label: Host
      options:
        - Codex
        - Claude Code
        - Gemini CLI
        - Direct runtime
    validations:
      required: true
  - type: dropdown
    id: region
    attributes:
      label: Region
      options:
        - cn
        - global
        - unknown
    validations:
      required: true
  - type: input
    id: commit
    attributes:
      label: Commit or release
      placeholder: 7530984 or v0.1.0
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Run ...
        2. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs
      description: Do not paste APP_KEY, APP_SECRET, access tokens, or private panorama data.
